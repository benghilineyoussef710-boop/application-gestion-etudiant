<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Etudiants</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <h1>Liste</h1>
        </div>
        <div class="row">
            <div class="col-lg-3">
                <a th:href="@{/etudiants/new}" class="btn btn-primary btn-small mb-3">ajouter</a>
            </div>
        </div>
            <table class="table table-striped table-bordered ">
                    <thead class="table-dark">
                        <tr>
                            <th>
                                nom
                            </th>
                            <th>
                                prenom
                            </th>
                            <th>
                                email
                            </th>   
                            <th>
                                action
                            </th>                    
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each = "etudiant : ${etudiants}">
                            <td th:text="${etudiant.nom}"></td>
                            <td th:text="${etudiant.prenom}"></td>
                            <td th:text="${etudiant.email}"></td>
                            <td>
                                <a th:href ="@{/etudiants/edit/{id}(id=${etudiant.id})}" class="btn btn-primary" >modifier</a> 
                                <a th:href ="@{/etudiants/delete/{id}(id=${etudiant.id})}" class="btn btn-danger" >supprimer</a>
                            </td>
        
                        </tr>
                    </tbody>
            </table>
        </div>
    </div>
</body>
</html>
